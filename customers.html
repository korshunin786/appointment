<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customers</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<!-- Navbar -->
<div id="navbar"></div>

<div class="flex">

  

  <!-- Main Content -->
  <main class="flex-1 p-8">

    <div class="flex justify-between items-center mb-8">
      <h1 class="text-4xl font-bold">Customers</h1>

      <input type="text" placeholder="Search customers..."
             class="border p-3 rounded-lg w-64">
    </div>

    <!-- Customers Table -->
    <div class="bg-white rounded-2xl shadow-lg overflow-hidden">

      <table class="w-full text-left">

        <thead class="bg-gray-100">
          <tr>
            <th class="p-4">Name</th>
            <th class="p-4">Phone</th>
            <th class="p-4">Last Visit</th>
            <th class="p-4">Total Visits</th>
            <th class="p-4">Status</th>
          </tr>
        </thead>
        <tbody>

          <tr class="border-t">
            <td class="p-4">Ahmed Khan</td>
            <td class="p-4">0300-1234567</td>
            <td class="p-4">2026-05-18</td>
            <td class="p-4">5</td>
            <td class="p-4">
              <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full">
                Active
              </span>
            </td>
          </tr>

          <tr class="border-t">
            <td class="p-4">Ali Raza</td>
            <td class="p-4">0311-9876543</td>
            <td class="p-4">2026-05-15</td>
            <td class="p-4">2</td>
            <td class="p-4">
              <span class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full">
                New
              </span>
            </td>
          </tr>

        </tbody>

      </table>

    </div>

  </main>

</div>

<script src="assets/js/components.js"></script>

</body>
</html>
