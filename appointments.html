</head>
<body class="bg-gray-100">

   <!-- Navbar -->
  <nav class="bg-black text-white p-4 shadow-lg">

    <div class="container mx-auto flex justify-between items-center">

      <h1 class="text-2xl font-bold text-pink-500">
        SalonAI
      </h1>

      <div class="space-x-6 hidden md:block">
        <a href="index.html" class="hover:text-pink-400">Home</a>
        <a href="services.html" class="hover:text-pink-400">Services</a>
        <a href="appointments.html" class="hover:text-pink-400">Appointments</a>
        <a href="dashboard.html" class="hover:text-pink-400">Dashboard</a>
        <a href="login.html" class="hover:text-pink-400">Login</a>
      </div>

    </div>

  </nav>
  <!-- Appointment -->
<div class="container mx-auto py-12 px-4">

  <div class="flex justify-between items-center mb-10">

    <h1 class="text-4xl font-bold">Appointments</h1>

    <button class="bg-pink-600 text-white px-6 py-3 rounded-xl">
      Add Appointment
    </button>

  </div>

  <div class="grid lg:grid-cols-2 gap-8">

    <div class="bg-white p-8 rounded-2xl shadow-lg">

      <h2 class="text-2xl font-bold mb-6">Today's Schedule</h2>

      <div class="space-y-6">

        <div class="border p-4 rounded-xl">
          <h3 class="font-bold text-xl">Haircut + Beard</h3>
          <p>Ahmed — 4:00 PM</p>
        </div>

        <div class="border p-4 rounded-xl">
          <h3 class="font-bold text-xl">Facial Treatment</h3>
          <p>Usman — 6:30 PM</p>
        </div>

      </div>

    </div>
    <div class="bg-white p-8 rounded-2xl shadow-lg">

      <h2 class="text-2xl font-bold mb-6">Quick Booking</h2>

      <form class="space-y-4">

        <input type="text"
               placeholder="Customer Name"
               class="w-full border p-4 rounded-xl">

        <input type="text"
               placeholder="Phone Number"
               class="w-full border p-4 rounded-xl">

        <select class="w-full border p-4 rounded-xl">
          <option>Haircut</option>
          <option>Haircut + Beard</option>
          <option>Premium Styling</option>
        </select>

        <input type="date"
               class="w-full border p-4 rounded-xl">

        <input type="time"
               class="w-full border p-4 rounded-xl">

        <button class="bg-pink-600 text-white px-6 py-4 rounded-xl w-full">
          Confirm Booking
        </button>

      </form>

    </div>

  </div>

</div>
