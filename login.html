<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-pink-500 to-purple-600 min-h-screen flex justify-center items-center">

<div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md">

  <h1 class="text-4xl font-bold text-center mb-8">
    Admin Login
  </h1>

  <form class="space-y-6">

    <input type="email"
           placeholder="Email"
           class="w-full border p-4 rounded-xl">

    <input type="password"
           placeholder="Password"
           class="w-full border p-4 rounded-xl">

    <button class="bg-pink-600 text-white w-full py-4 rounded-xl font-bold">
      Login
    </button>

  </form>

</div>

</body>
</html>
