<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Panel</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="flex h-screen">

  
  <!-- Users -->
  <div class="w-1/3 bg-white border-r overflow-y-auto">

    <div class="p-6 border-b">
      <h2 class="text-2xl font-bold">Customers</h2>
    </div>

    <div class="p-4 border-b hover:bg-gray-100 cursor-pointer">
      <h3 class="font-bold">Ahmed</h3>
      <p class="text-sm text-gray-500">Need haircut today</p>
    </div>

    <div class="p-4 border-b hover:bg-gray-100 cursor-pointer">
      <h3 class="font-bold">Ali</h3>
      <p class="text-sm text-gray-500">What are your prices?</p>
    </div>

  </div>

  <!-- Chat Area -->
  <div class="flex-1 flex flex-col">

    <!-- Header -->
    <div class="bg-white p-6 border-b">
      <h2 class="text-2xl font-bold">Ahmed</h2>
    </div>

    <!-- Messages -->
    <div class="flex-1 p-6 overflow-y-auto space-y-6">

      <div class="flex justify-start">
        <div class="bg-gray-200 p-4 rounded-2xl max-w-md">
          Hi, do you have time today?
        </div>
      </div>
      <div class="flex justify-end">
        <div class="bg-pink-600 text-white p-4 rounded-2xl max-w-md">
          Yes 😊
          
          Would you like:
          Haircut,
          Beard,
          or Premium Styling?
        </div>
      </div>

    </div>

    <!-- Input -->
    <div class="bg-white p-4 border-t flex gap-4">

      <input type="text"
             placeholder="Type message"
             class="flex-1 border p-4 rounded-xl">

      <button class="bg-pink-600 text-white px-6 rounded-xl">
        Send
      </button>

    </div>

  </div>

</div>

<!-- Kommunicate Chat Agent -->

    (function(d, m){
        var kommunicateSettings = 
            {"appId":"3d6261307cf6ddf3787566398648a6eea","popupWidget":true,"automaticChatOpenOnNavigation":true};
        var s = document.createElement("script"); s.type = "text/javascript"; s.async = true;
        s.src = "https://widget.kommunicate.io/kommunicate-widget-3.0.min.js";
        var h = document.getElementsByTagName("head")[0]; h.appendChild(s);
        window.kommunicate = m; m._globals = kommunicateSettings;
    })(document, window.kommunicate || {});
/* NOTE : Use web server to view HTML files as real-time update will not work if you directly open the HTML file in the browser. */
</script>


  
</body>
</html>
